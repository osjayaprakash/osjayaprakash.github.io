# Setup
title:               'Jayaprakash Sundararaj'
tagline:             'Engineer'
description:         ''
url:                 'https://www.jayaprakash.net'
baseurl:             ''
permalink:           pretty
show_downloads:      false
repository:          osjayaprakash/osjayaprakash.github.io

author:
  name:              Jayaprakash Sundararaj
  url:               'https://www.jayaprakash.net/'
  email:             'osjp463@gmail.com'
  picture:           'https://www.jayaprakash.net/images/jp.jpg'

# remote_theme: jekyll-theme-hacker
# remote_theme: pages-themes/slate
# remote_theme: pages-themes/slate@v0.2.0
#theme: jekyll-theme-slate
remote_theme: riggraz/no-style-please

defaults:
  - values:
      seo_description_max_words: 200

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-github-metadata
  - jekyll-sitemap
  - faraday-retry

seo_paginator_message: "%<current>s / %<total>s | "

# no-style-please theme configuration
theme_config:
  appearance: "auto"                    # light, dark, or auto
  show_description: true
  back_home_text: "← home"

# Defaults for all pages
defaults:
  - scope:
      path: "_posts"
    values:
      layout: post
