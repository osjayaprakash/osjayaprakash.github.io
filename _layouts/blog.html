---
layout: default
---

{{ content }}

{% assign posts = site.posts %}

{%- if posts.size > 0 -%}
  <ul class="post-list">
    {%- for post in posts -%}
    <li class="post-item">
      <span class="post-date">{{ post.date | date: "%b %-d, %Y" }}</span>
      &nbsp;·&nbsp;
      <a class="post-link" href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
    </li>
    {%- endfor -%}
  </ul>
{%- endif -%}
